name: Publish Python Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
    - name: Build package
      run: |
        rm -rf dist/
        python -m build
    - name: Check version not already on PyPI
      run: |
        python -c "
        import json, urllib.request, tomllib, sys, os
        with open('pyproject.toml', 'rb') as f:
            version = tomllib.load(f)['project']['version']
        url = 'https://pypi.org/pypi/mindmapconverter/json'
        data = json.loads(urllib.request.urlopen(url).read())
        releases = data.get('releases', {})
        if version in releases:
            print(f'Version {version} already published on PyPI — skipping upload.')
            with open(os.environ['GITHUB_OUTPUT'], 'w') as out:
                out.write('skip_publish=true\n')
        else:
            print(f'Version {version} not found on PyPI — proceeding.')
        "
      id: version_check
    - name: Publish to PyPI
      if: steps.version_check.outputs.skip_publish != 'true'
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
