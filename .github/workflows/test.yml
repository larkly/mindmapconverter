name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install package
        run: pip install -e .
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check .
      - name: Run tests
        run: python -m unittest discover -s . -p "test_*.py" -v
